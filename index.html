<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>CACULATOR</h1>

  <div class="container">
    <div class="display-pannel">0</div>
    <div class="numerals">
      <ul>
        <li><button class="digit">0</button></li>
        <li><button class="digit">9</button></li>
        <li><button class="digit">8</button></li>
        <li><button class="digit">7</button></li>
        <li><button class="digit">6</button></li>
        <li><button class="digit">5</button></li>
        <li><button class="digit">4</button></li>
        <li><button class="digit">3</button></li>
        <li><button class="digit">2</button></li>
        <li><button class="digit">1</button></li>
      </ul>
    </div>

    <div class="operators">
      <ul >
        <li><button class="operator">+</button></li>
        <li><button class="operator">-</button></li>
        <li><button class="operator">*</button></li>
        <li><button class="operator">/</button></li>
      </ul>
      <button class="clear-btn">AC</button>
      <button id="equal-btn">=</button>
    </div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
